<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover tells iOS Safari to extend content under the
      notch / home-indicator; we pair it with env(safe-area-inset-*)
      padding in CSS so chrome never hides underneath. maximum-scale
      is deliberately unset — users are free to pinch-zoom. The virtual
      keyboard's resize behavior is handled per-element via dvh/svh,
      not here.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Type stack. Loaded via <link> here (not @import in CSS) so the font
      request races with CSS parsing instead of blocking after it. The
      preconnect pair establishes the TLS handshake to fonts.gstatic.com
      while the stylesheet itself is being fetched, shaving the second
      round-trip off first paint. Without this, the fallback face renders
      first and the swap to webfonts is visibly fuzzy mid-stride.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fira+Code:wght@400;500;600&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Oranienbaum&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    />
    <title>Yarrow</title>
    <!--
      FOUC blocker. Reads the persisted theme config and sets
      data-theme on <html> *before* the bundle parses, so the
      first paint already matches the resolved palette. Mirrors
      the runtime resolver in src/lib/theme.svelte.ts; keep them
      in sync. The legacy "yarrow.theme" single-string key is
      consulted as a fallback so users upgrading from the older
      build don't flash the new Vellum default before the proper
      migration runs.
    -->
    <script>
      (function () {
        try {
          var html = document.documentElement;
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var defaultLight = "vellum";
          var defaultDark = "workshop";
          var lightSet = { vellum: 1, linen: 1, ashrose: 1 };
          var darkSet = { workshop: 1, graphite: 1, dracula: 1 };
          var palette = null;

          var rawCfg = null;
          try {
            rawCfg = localStorage.getItem("yarrow.theme.config");
          } catch (e) {}
          if (rawCfg) {
            try {
              var cfg = JSON.parse(rawCfg);
              var lt = lightSet[cfg.lightTheme] ? cfg.lightTheme : defaultLight;
              var dt = darkSet[cfg.darkTheme] ? cfg.darkTheme : defaultDark;
              if (cfg.mode === "auto") palette = prefersDark ? dt : lt;
              else if (cfg.mode === "light") palette = lt;
              else if (cfg.mode === "dark") palette = dt;
              else if (lightSet[cfg.mode] || darkSet[cfg.mode])
                palette = cfg.mode;
            } catch (e) {}
          }

          if (!palette) {
            var legacy = null;
            try {
              legacy = localStorage.getItem("yarrow.theme");
            } catch (e) {}
            if (legacy === "light") palette = "linen";
            else if (legacy === "dark") palette = "graphite";
            else if (legacy === "auto")
              palette = prefersDark ? "graphite" : "linen";
            else if (lightSet[legacy] || darkSet[legacy]) palette = legacy;
          }

          if (!palette) palette = prefersDark ? defaultDark : defaultLight;

          html.setAttribute("data-theme", palette);
          if (darkSet[palette]) html.classList.add("dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "vellum");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
