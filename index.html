<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover tells iOS Safari to extend content under the
      notch / home-indicator; we pair it with env(safe-area-inset-*)
      padding in CSS so chrome never hides underneath. maximum-scale
      is deliberately unset — users are free to pinch-zoom. The virtual
      keyboard's resize behavior is handled per-element via dvh/svh,
      not here.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Type stack. Loaded via <link> here (not @import in CSS) so the font
      request races with CSS parsing instead of blocking after it. The
      preconnect pair establishes the TLS handshake to fonts.gstatic.com
      while the stylesheet itself is being fetched, shaving the second
      round-trip off first paint. Without this, the fallback face renders
      first and the swap to webfonts is visibly fuzzy mid-stride.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <title>Yarrow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
